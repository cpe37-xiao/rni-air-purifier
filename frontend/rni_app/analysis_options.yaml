include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat these as errors instead of warnings
    missing_required_param: error
    missing_return: error
    dead_code: error

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true # const [] instead of []
    prefer_const_declarations: true # const for local variables
    # --- Code Safety ---
    avoid_print: true # Use proper logging instead of print()
    avoid_empty_else: true # Prevents empty else blocks
    avoid_relative_lib_imports: true # Use package: imports instead of relative
    cancel_subscriptions: true # StreamSubscriptions must be cancelled
    close_sinks: true # StreamSinks must be closed

    # --- Dart Style ---
    prefer_final_locals: true # final for variables that don't change
    prefer_final_fields: true # final for fields that don't change
    unnecessary_this: true # Remove redundant this.
    unnecessary_new: true # Remove redundant new keyword
    unnecessary_nullable_for_final_variable_declarations: true

    # --- Flutter Specific ---
    use_key_in_widget_constructors: true # Always pass key to widgets
    sized_box_for_whitespace: true # SizedBox instead of Container for spacing
    avoid_unnecessary_containers: true # Remove pointless Container wrappers
    use_full_hex_values_for_flutter_colors: # 0xFFFFFFFF not 0xFFFFF
      true

    # --- Async ---
    unawaited_futures: true # Warn on fire-and-forget futures
    await_only_futures: true # Only await actual Futures
